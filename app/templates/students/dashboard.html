{% extends "base.html" %}
{% block content %}

<h2>My Attendance</h2>

{% if records %}
<table class="table table-bordered">
  <thead class="table-dark">
    <tr>
      <th>Date</th>
      <th>Class</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    {% for r in records %}
    <tr class="{% if r.status == 'PRESENT' %}table-success{% else %}table-danger{% endif %}">
      <td>{{ r.date }}</td>
      <td>{{ r.class_name }}</td>
      <td>{{ r.status }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
  <p class="text-muted">No attendance records yet.</p>
{% endif %}

{% endblock %}
