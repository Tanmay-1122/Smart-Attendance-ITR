{% extends "base.html" %}
{% block content %}
<div class="auth-root">
  <div class="auth-header">
    <div class="auth-logo-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <h1>SmartAttend</h1>
    <p>Set a new password</p>
  </div>

  <div class="auth-sheet">
    <div class="sheet-title">Reset password</div>
    <div class="sheet-sub">Choose a strong new password</div>

    <form method="POST" action="/auth/reset-password/{{ token }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="field auth-field">
        <label class="label">New password</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" name="password" class="input" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field auth-field">
        <label class="label">Confirm password</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" name="confirm" class="input" placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary mt-3">Reset password</button>
    </form>

    <div class="auth-switch">
      <a href="/auth/login">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
