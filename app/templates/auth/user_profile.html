{% extends "base.html" %}
{% block content %}
<div class="page" style="max-width:480px;">

  <!-- Back button -->
  <div style="margin-bottom:16px;">
    <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--text-2);transition:color .15s;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>

  <!-- Profile Card -->
  <div class="card">
    <div class="card-body" style="display:flex;flex-direction:column;align-items:center;padding:32px 24px;text-align:center;">

      <!-- Avatar -->
      <div class="profile-view-avatar">
        {% if profile_user.profile_photo %}
        <img src="/static/uploads/{{ profile_user.profile_photo }}" alt="{{ profile_user.name }}">
        {% else %}
        <span>{{ profile_user.name[0]|upper }}</span>
        {% endif %}
      </div>

      <!-- Name -->
      <div style="font-size:1.3rem;font-weight:800;color:var(--text);margin-top:16px;">{{ profile_user.name }}</div>

      <!-- Role badge -->
      <div style="margin-top:8px;">
        <span class="badge {% if profile_user.role == 'teacher' %}badge-review{% else %}badge-present{% endif %}" style="font-size:.7rem;padding:4px 12px;">
          {{ profile_user.role|capitalize }}
        </span>
      </div>

      <!-- Email -->
      <div style="font-size:.85rem;color:var(--text-3);margin-top:12px;">{{ profile_user.email }}</div>

    </div>
  </div>

</div>

<style>
.profile-view-avatar {
  width: 96px; height: 96px; border-radius: 50%;
  background: linear-gradient(135deg, var(--brand) 0%, #7C3AED 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 2.2rem; font-weight: 800;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(99,102,241,.3);
}
.profile-view-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
</style>
{% endblock %}
