{% extends "base.html" %}
{% block content %}
<div class="auth-root">
  <!-- Extra cosmic orbs for auth -->
  <div style="position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(196,181,253,0.2) 0%,transparent 70%);top:30%;left:50%;filter:blur(60px);pointer-events:none;animation:cosmicDrift3 20s ease-in-out infinite alternate;"></div>
  <div style="position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 60%);top:15%;left:20%;filter:blur(50px);pointer-events:none;animation:cosmicDrift4 16s ease-in-out infinite alternate;"></div>
  <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.15) 0%,transparent 65%);bottom:30%;right:15%;filter:blur(40px);pointer-events:none;animation:cosmicDrift1 24s ease-in-out infinite alternate;"></div>

  <!-- Decorative SVG waves -->
  <svg style="position:absolute;bottom:0;left:0;width:100%;height:120px;pointer-events:none;z-index:0;" viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,80 C360,120 720,40 1080,80 C1260,100 1380,60 1440,80 L1440,120 L0,120 Z" fill="rgba(255,255,255,0.03)"/>
    <path d="M0,90 C320,50 640,110 960,70 C1200,40 1360,90 1440,70 L1440,120 L0,120 Z" fill="rgba(255,255,255,0.02)"/>
  </svg>

  <div class="auth-header">
    <div class="auth-logo-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <h1>SmartAttend</h1>
    <p>AI-powered attendance management</p>
  </div>

  <div class="auth-sheet">
    <div class="sheet-title">Create account</div>
    <div class="sheet-sub">Fill in your details to get started</div>

    <form method="POST" action="/auth/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="field auth-field">
        <label class="label">Full name</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" name="name" class="input" placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="field auth-field">
        <label class="label">Email address</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" name="email" class="input" placeholder="you@university.edu" required autocomplete="email">
      </div>
      <div class="field auth-field">
        <label class="label">Password</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" name="password" class="input" placeholder="Create a strong password" required autocomplete="new-password">
      </div>
      <div class="field auth-field">
        <label class="label">Department</label>
        <svg class="auth-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V3.5A2.5 2.5 0 0 1 6.5 1H20v21H6.5a2.5 2.5 0 0 1-2.5-2.5z"/></svg>
        <select name="department_id" class="select" style="padding-left: 36px;">
          <option value="">Select your department (Optional)</option>
          {% for d in departments %}
          <option value="{{ d.id }}">{{ d.name }} ({{ d.code }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label class="label" style="font-size:.78rem;color:var(--text-tertiary);">
          Note: Only admins can grant teacher access. Contact an admin after registering.
        </label>
      </div>
      <button type="submit" class="btn btn-primary mt-3">Create account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="/auth/login">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
