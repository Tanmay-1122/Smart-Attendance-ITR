{% extends "base.html" %}
{% block content %}
<div class="page">

  <div class="page-title">Export Records</div>
  <div class="page-sub">Download attendance data as a CSV file for any class.</div>

  <div class="card">
    <div class="card-body">
      <form method="GET" action="/teacher/export">
        <div class="field">
          <label class="label">Class name</label>
          {% if classes %}
          <select name="class_name" class="select" required>
            <option value="" disabled selected>Select a class</option>
            {% for tc in classes %}
            <option value="{{ tc.name }}">{{ tc.name }}</option>
            {% endfor %}
          </select>
          {% else %}
          <input type="text" name="class_name" class="input" placeholder="No classes created yet" disabled>
          {% endif %}
        </div>
        <button type="submit" class="btn btn-primary mt-3">Download CSV</button>
      </form>
    </div>
  </div>

  <div class="mt-4">
    <a href="/teacher/dashboard" class="btn btn-ghost">Back to dashboard</a>
  </div>

</div>
{% endblock %}
