{% extends "base.html" %}
{% block content %}
<div class="page">

  <div class="page-title" style="margin-bottom:4px;">Weekly Remarks</div>
  <div class="page-sub">Write remarks for the upcoming week ({{ week_start }} — {{ week_end }})</div>

  <div class="card mb-3">
    <div class="card-body" style="display:flex;gap:12px;align-items:end;flex-wrap:wrap;">
      <div class="field" style="margin:0;flex:1;min-width:200px;">
        <label class="label">Select class</label>
        <select id="class-select" class="select" onchange="loadStudents()">
          <option value="">Choose a class...</option>
          {% for c in classes %}
          <option value="{{ c.name }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field" style="margin:0;">
        <label class="label">Week starting</label>
        <input type="date" id="week-start" class="input" value="{{ week_start }}" onchange="loadStudents()">
      </div>
    </div>
  </div>

  <div id="remarks-container">
    <div class="card empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <p>Select a class to write remarks.</p>
    </div>
  </div>

</div>

<script>
let currentStudents = [];

function loadStudents() {
  const class_name = document.getElementById('class-select').value;
  const week_start = document.getElementById('week-start').value;
  const container = document.getElementById('remarks-container');

  if (!class_name) {
    container.innerHTML = `<div class="card empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><p>Select a class to write remarks.</p></div>`;
    return;
  }

  fetch(`/teacher/remarks/students?class_name=${encodeURIComponent(class_name)}&week_start=${week_start}`)
    .then(r => r.json())
    .then(data => {
      currentStudents = data.students || [];
      renderRemarks(data);
    })
    .catch(() => {
      container.innerHTML = `<div class="card empty"><p>Failed to load students.</p></div>`;
    });
}

function renderRemarks(data) {
  const students = data.students || [];
  const week_start = data.week_start || '';
  const container = document.getElementById('remarks-container');

  if (students.length === 0) {
    container.innerHTML = `<div class="card empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p>No students in this class.</p></div>`;
    return;
  }

  let html = `<form id="remarks-form" onsubmit="saveRemarks(event)">`;
  html += `<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>`;

  for (const s of students) {
    const attColor = s.attendance_pct >= 75 ? 'var(--success)' : s.attendance_pct >= 50 ? 'var(--warning)' : 'var(--danger)';
    html += `
      <div class="card mb-2">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div>
              <span style="font-weight:700;font-size:.9rem;">${escapeHtml(s.name)}</span>
              <span style="font-size:.72rem;color:var(--text-3);margin-left:6px;">#${escapeHtml(s.roll_number || '')}</span>
            </div>
            <span style="font-size:.72rem;font-weight:600;color:${attColor};">${s.attendance_pct}% this week</span>
          </div>
          <textarea class="input" rows="2" style="resize:vertical;min-height:60px;"
            placeholder="Write remark for ${escapeHtml(s.name)}..."
            data-student-id="${s.student_id}">${escapeHtml(s.remark)}</textarea>
        </div>
      </div>`;
  }

  html += `
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button type="submit" class="btn btn-primary">Save all remarks</button>
    </div>
  </form>`;

  container.innerHTML = html;
}

function saveRemarks(event) {
  event.preventDefault();
  const week_start = document.getElementById('week-start').value;
  const textareas = document.querySelectorAll('#remarks-form textarea');
  const remarks = [];

  textareas.forEach(ta => {
    const student_id = parseInt(ta.dataset.studentId);
    const remark = ta.value.trim();
    if (remark) {
      remarks.push({ student_id, remark });
    }
  });

  if (remarks.length === 0) {
    alert('No remarks to save.');
    return;
  }

  fetch('/teacher/remarks/save', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': '{{ csrf_token() }}'
    },
    body: JSON.stringify({ remarks, week_start })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert(`Saved ${data.saved} remark(s)!`);
    } else {
      alert('Failed to save remarks.');
    }
  })
  .catch(() => alert('Network error.'));
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
{% endblock %}
